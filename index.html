<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" type="text/css" href="./css/style.css" />
        <script type="module" src="./scripts/script.js" defer="defer"></script>
    </head>
    <body>
        <div id="wrapper">
            <main class="container">
                <h1>COMP 2132 Project</h1>
                <section id="hangman">
                    <div id="hangman-graphic">
                        <div id="hp-bars">
                            <div class="hp-container">
                                <div class="hp-bg">
                                    <div id="pone-hp" class="hp-fill">
                                        <div id="pone-hp-text" class="hp-text"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="hp-container">
                                <div class="hp-bg">
                                    <div id="ptwo-hp" class="hp-fill">
                                        <div id="ptwo-hp-text" class="hp-text"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div id="message"></div>
                        <img src="./images/ryu/ryu-idle.gif" id="p-one" />
                        <img src="./images/sagat/sagat-idle.gif" id="p-two" />
                    </div>
                    <div id="hangman-control">
                        <div id="output"></div>
                        <div id="hint"></div>
                        <button id="newword" type="button">Start</button>
                    </div>
                    <div id="hangman-keys">
                        <div id="keyrowQ"></div>
                        <div id="keyrowA"></div>
                        <div id="keyrowZ"></div>
                    </div>
                </section>
                   
            </main>

            <footer></footer>
        </div>
        
    </body>
</html>
